name: validate

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest ruff voluptuous
      - name: Validate metadata
        run: |
          python -m json.tool hacs.json >/dev/null
          python -m json.tool custom_components/improved_tlocal/manifest.json >/dev/null
      - name: Python syntax
        run: python -m compileall custom_components/improved_tlocal
      - name: Ruff
        run: ruff check custom_components/improved_tlocal
      - name: Pytest
        run: pytest
      - name: Validate HACS metadata
        uses: hacs/action@main
        with:
          category: integration
